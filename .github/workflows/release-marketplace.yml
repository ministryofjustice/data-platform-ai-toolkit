---
name: Release Marketplace

on:
  release:
    types:
      - published

permissions: {}

jobs:
  release:
    name: Release Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install APM CLI
        run: pip install "apm-cli==0.20.0"

      - name: Build and attach marketplace artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apm pack --check-versions --check-clean --json > "${RUNNER_TEMP}/pack-report.json"
          sha256sum .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.sha256
          gh release upload "${GITHUB_REF_NAME}" \
            .claude-plugin/marketplace.json \
            .claude-plugin/marketplace.json.sha256 \
            --clobber
