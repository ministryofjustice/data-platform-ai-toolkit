---
name: Release Marketplace

on:
  push:
    tags:
      - "*-v*"

permissions: {}

jobs:
  release:
    name: Release Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install APM CLI
        run: pip install "apm-cli==0.20.0"

      - name: Build and publish marketplace
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apm pack --check-versions --check-clean --json > pack-report.json
          for f in build/*.zip .claude-plugin/marketplace.json; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "${f}.sha256"
          done
          gh release create "${GITHUB_REF_NAME}" \
            .claude-plugin/marketplace.json \
            .claude-plugin/marketplace.json.sha256 \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
