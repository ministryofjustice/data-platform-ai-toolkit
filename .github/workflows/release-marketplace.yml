---
name: Release Marketplace

on:
  push:
    tags:
      - "*-v*"

permissions: {}

jobs:
  release:
    name: Release Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install APM CLI
        run: pip install "apm-cli==0.20.0"

      - name: Build and publish marketplace
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apm pack --check-versions --check-clean --json > pack-report.json
          sha256sum .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.sha256
          gh release create "${GITHUB_REF_NAME}" \
            .claude-plugin/marketplace.json \
            .claude-plugin/marketplace.json.sha256 \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
