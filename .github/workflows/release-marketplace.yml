---
name: Release Marketplace

on:
  release:
    types:
      - published

permissions: {}

jobs:
  release:
    name: Release Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install APM CLI
        run: pip install "apm-cli==0.20.0"

      - name: Build and attach marketplace artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apm pack --check-versions --check-clean --json > "${RUNNER_TEMP}/pack-report.json"
          sha256sum .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.sha256
          gh release upload "${GITHUB_REF_NAME}" \
            .claude-plugin/marketplace.json \
            .claude-plugin/marketplace.json.sha256 \
            --clobber
